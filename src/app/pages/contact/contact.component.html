<section class="bg-light" id="contact" *ngIf="contactMethods?.length > 0">
  <div class="container">
    <header class="mb-5 pb-4">
      <p class="font-weight-bold text-uppercase letter-spacing-3 section-label">Get in touch.</p>
      <h2 class="text-uppercase lined">Contact</h2>
    </header>
    <div class="contact-grid">
      <ng-container *ngFor="let contact of contactMethods">

        <div class="contact-card" *ngIf="contact.type === 'Phone'">
          <div class="contact-card-icon">
            <i [class]="contact.icon.cssClass"></i>
          </div>
          <div class="contact-card-body">
            <div class="contact-type">{{ contact.type }}</div>
            <div class="contact-value">{{ contact.name }}</div>
          </div>
        </div>

        <a class="contact-card" *ngIf="contact.type !== 'Phone'"
           href="{{ contact.value }}" target="_blank" rel="noopener noreferrer">
          <div class="contact-card-icon">
            <i [class]="contact.icon.cssClass"></i>
          </div>
          <div class="contact-card-body">
            <div class="contact-type">{{ contact.type }}</div>
            <div class="contact-value">{{ contact.name }}</div>
          </div>
          <span class="contact-arrow">&#8599;</span>
        </a>

      </ng-container>
    </div>
  </div>
</section>
