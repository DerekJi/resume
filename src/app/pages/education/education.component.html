<section class="bg-light" id="education" *ngIf="educations">
  <div class="container">
    <header class="mb-5 pb-4">
      <p class="font-weight-bold text-uppercase letter-spacing-3 section-label">Always learning, always growing.</p>
      <h2 class="text-uppercase lined">Education</h2>
    </header>
    <div class="exp-grid">
      <div class="exp-card" *ngFor="let edu of educations">
        <div class="exp-period">{{ edu.from.year }} &ndash; {{ edu.to.year }}</div>
        <h3 class="exp-company">
          <a class="exp-link" href="{{ edu.organisation.officialWebsite }}" target="_blank" style="font-size:1rem; margin-left:0">
            {{ edu.organisation.name }}
          </a>
        </h3>
        <div class="exp-position">{{ edu.degree }} Degree &mdash; {{ edu.major }}</div>
        <div class="exp-location">
          <i class="fa fa-map-marker mr-1"></i>
          {{ edu.organisation.city.city }}, {{ edu.organisation.city.country }}
        </div>
      </div>
    </div>
  </div>
</section>
